<div class="modal fade" id="addLabModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title fw-bold">

                    <!-- lab icon -->
                    <svg xmlns="http://www.w3.org/2000/svg"
                    width="18" height="18"
                    fill="currentColor"
                    class="me-2"
                    viewBox="0 0 16 16">

                        <path d="M4.5 0a.5.5 0 0 1 .5.5V2h6V.5a.5.5 
                        0 0 1 1 0V2h1a1 1 0 0 1 1 1v1H1V3a1 1 
                        0 0 1 1-1h1V.5a.5.5 0 0 1 .5-.5z"/>

                    </svg>

                    Add Laboratory

                </h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>


            <div class="modal-body">

                <form method="POST" action="{% url 'add_lab' %}">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Laboratory Name
                        </label>

                        <input type="text"
                        name="room_name"
                        class="form-control"
                        required>

                    </div>


                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Location
                        </label>

                        <input type="text"
                        name="location"
                        class="form-control"
                        required>

                    </div>


                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Capacity
                        </label>

                        <input type="number"
                        name="capacity"
                        class="form-control">

                    </div>


                    <button class="btn btn-primary w-100">

                        <!-- plus icon -->
                        <svg xmlns="http://www.w3.org/2000/svg"
                        width="16" height="16"
                        fill="currentColor"
                        class="me-1"
                        viewBox="0 0 16 16">

                        <path d="M8 1v14M1 8h14"/>

                        </svg>

                        Add Laboratory

                    </button>

                </form>

            </div>

        </div>

    </div>

</div> 

<div class="modal fade" id="deleteLabModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title fw-bold">

                    Delete Laboratory

                </h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>


            <div class="modal-body">

                <form method="POST" id="deleteForm">
                    {% csrf_token %}

                    <p>Are you sure you want to delete this laboratory?</p>

                    <div class="d-flex justify-content-end gap-2">

                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancel
                        </button>

                        <button 
                            type="submit"
                            class="btn btn-sm btn-outline-danger delete-btn"
                            data-room-id="{{ room.id }}"
                            data-bs-toggle="modal"
                            data-bs-target="#deleteLabModal">
                            Delete
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.delete-btn').forEach(button => {
            button.addEventListener('click', function () {
                const roomId = this.getAttribute('data-room-id');

                if (roomId) {
                    const form = document.getElementById('deleteForm');
                    form.action = `/delete-lab/${roomId}/`;
                }
            });
        });
    });
</script>
