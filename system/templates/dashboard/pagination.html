<nav aria-label="Rooms pagination">
    <ul class="pagination justify-content-center my-4">
        
        {% if rooms.has_previous %}
            <li class="page-item">
                <a class="page-link border-dark text-dark hover-bg-black" href="?page={{ rooms.previous_page_number }}" aria-label="Previous">
                    <i class="bi bi-chevron-left me-1"></i> Previous
                </a>
            </li>
        {% else %}
            <li class="page-item disabled">
                <span class="page-link border-light text-muted opacity-50">
                    <i class="bi bi-chevron-left me-1"></i> Previous
                </span>
            </li>
        {% endif %}

        <li class="page-item disabled">
            <span class="page-link border-dark bg-dark text-white fw-bold px-4">
                {{ rooms.number }} <span class="fw-normal opacity-50 mx-1">/</span> {{ rooms.paginator.num_pages }}
            </span>
        </li>

        {% if rooms.has_next %}
            <li class="page-item">
                <a class="page-link border-dark text-dark hover-bg-black" href="?page={{ rooms.next_page_number }}" aria-label="Next">
                    Next <i class="bi bi-chevron-right ms-1"></i>
                </a>
            </li>
        {% else %}
            <li class="page-item disabled">
                <span class="page-link border-light text-muted opacity-50">
                    Next <i class="bi bi-chevron-right ms-1"></i>
                </span>
            </li>
        {% endif %}
    </ul>
</nav>
