<nav aria-label="Rooms pagination">
    <ul class="pagination  justify-content-center my-4">
        {% if rooms.has_previous %}
            <li class="page-item">
                <a class="page-link" href="?page={{ rooms.previous_page_number }}" aria-label="Previous">
                    &laquo; Previous
                </a>
            </li>
        {% else %}
            <li class="page-item disabled"><span class="page-link">&laquo; Previous</span></li>
        {% endif %}

        <li class="page-item disabled"><span class="page-link">Page {{ rooms.number }} of {{ rooms.paginator.num_pages }}</span></li>

        {% if rooms.has_next %}
            <li class="page-item">
                <a class="page-link" href="?page={{ rooms.next_page_number }}" aria-label="Next">
                    Next &raquo;
                </a>
            </li>
        {% else %}
            <li class="page-item disabled"><span class="page-link">Next &raquo;</span></li>
        {% endif %}
    </ul>
</nav>
