<h1>Inspection Report</h1>

<table border="1">
<tr>
    <th>Unit</th>
    <th>Technician</th>
    <th>Period</th>
    <th>Date</th>
</tr>

{% for i in inspections %}
<tr>
    <td>{{ i.unit.asset_tag }}</td>
    <td>{{ i.technician.name }}</td>
    <td>{{ i.period }}</td>
    <td>{{ i.date_checked }}</td>
</tr>
{% endfor %}

</table>
