<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LabTrack - {% block title %}{% endblock %}</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Optional: Your custom styles -->
    <style>
        body {
            background-color: #f8f9fa;
        }
        .status-badge {
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.3em 0.7em;
            border-radius: 12px;
            color: #fff;
            display: inline-block;
            text-align: center;
            min-width: 90px;
        }
        .status-operational {
            background-color: #28a745;
        }
        .status-maintenance {
            background-color: #c69500;
        }
        /* Navbar brand */
        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.05em;
        }
        .navbar-nav .nav-link{
            position: relative;
            font-weight: 500;
            margin-right: 15px;
        }

        /* blue line */
        .navbar-nav .nav-link::after{
            content: "";
            position: absolute;
            width: 0;
            height: 3px;
            left: 0;
            bottom: -5px;
            background-color: #0d6efd; /* bootstrap blue */
            transition: width 0.3s ease-in-out;
        }

        /* hover effect */
        .navbar-nav .nav-link:hover::after{
            width: 100%;
        }

        .card {
            transition: 0.2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">LabTrack</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="{% url 'dashboard' %}" class="nav-link">Dashboard</a></li>
                    <li class="nav-item"><a href="{% url 'laboratory' %}" class="nav-link">Laboratory</a></li>
                    <li class="nav-item"><a href="{% url 'inspection_form' %}" class="nav-link">Inspection</a></li>
                    <li class="nav-item"><a href="{% url 'report' %}" class="nav-link">Report</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        {% block content %}
        <!-- Main page content here -->
        {% endblock %}
        
    </main>


    <!-- Bootstrap 5 JS Bundle -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
